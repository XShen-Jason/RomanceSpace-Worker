<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目文档中心 - RomanceSpace</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f8fafc;
      color: #1e293b;
      overflow: hidden;
    }

    /* 整体布局 */
    .layout {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* 左侧导航 */
    .sidebar {
      width: 280px;
      background: #0f172a;
      /* 深蓝色背景 */
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05);
      z-index: 10;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      padding: 24px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.5px;
    }

    .logo-icon {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .search {
      padding: 20px;
    }

    .search-container {
      position: relative;
    }

    .search input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #f1f5f9;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      outline: none;
    }

    .search input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .search input:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }

    .menu {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 20px 12px;
    }

    /* 隐藏滚动条但保留功能 */
    .menu::-webkit-scrollbar {
      width: 6px;
    }

    .menu::-webkit-scrollbar-track {
      background: transparent;
    }

    .menu::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .menu-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.4);
      margin: 10px 8px;
      font-weight: 600;
    }

    .menu-item {
      padding: 12px 16px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
      color: #cbd5e1;
      font-weight: 500;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .menu-item.active {
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .menu-icon {
      opacity: 0.7;
      font-size: 16px;
    }

    .menu-item.active .menu-icon {
      opacity: 1;
    }

    /* 内容区域 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
    }

    /* 顶部 */
    .topbar {
      height: 64px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      padding: 0 32px;
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
    }

    .breadcrumb span.current {
      color: #0f172a;
      font-weight: 600;
    }

    /* iframe */
    .viewer {
      flex: 1;
      padding: 24px 32px;
      overflow: hidden;
      /* 防止出现双滚动条 */
    }

    .viewer-container {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      border: 1px solid #e2e8f0;
      overflow: hidden;
      display: flex;
    }

    .viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
    }
  </style>
</head>

<body>

  <div class="layout">

    <div class="sidebar">

      <div class="logo">
        <div class="logo-icon">🚀</div>
        RomanceSpace
      </div>

      <div class="search">
        <div class="search-container">
          <span class="search-icon">🔍</span>
          <input id="search" placeholder="搜索文档页面...">
        </div>
      </div>

      <div class="menu" id="menu">
        <div class="menu-label">文档库</div>
        <!-- 菜单由 JS 动态生成 -->
      </div>

    </div>

    <div class="main">

      <div class="topbar">
        <div class="breadcrumb">
          <span>🏠 首页</span>
          <span>/</span>
          <span class="current" id="title">欢迎加载</span>
        </div>
      </div>

      <div class="viewer">
        <div class="viewer-container">
          <iframe id="viewer"></iframe>
        </div>
      </div>

    </div>

  </div>

  <script>
    /*
    ==================================
    页面配置
    新增页面只需要在这里添加
    ==================================
    */
    const pages = [
      {
        title: "运营方案 & 定位",
        file: "pages/operation.html",
        icon: "📊"
      },
      {
        title: "子域名系统设计",
        file: "pages/system.html",
        icon: "⚙️"
      },
      {
        title: "项目架构",
        file: "pages/architecture.html",
        icon: "🏗️"
      }
    ]

    const menu = document.getElementById("menu")
    const viewer = document.getElementById("viewer")
    const title = document.getElementById("title")

    function loadPage(page) {
      viewer.src = page.file
      title.innerText = page.title

      document.querySelectorAll(".menu-item").forEach(i => {
        i.classList.remove("active")
      })

      const activeItem = document.querySelector(`[data-file="${page.file}"]`)
      if (activeItem) {
        activeItem.classList.add("active")
      }
    }

    // 初始化菜单
    pages.forEach(page => {
      const div = document.createElement("div")
      div.className = "menu-item"
      div.dataset.file = page.file

      div.innerHTML = `<span class="menu-icon">${page.icon}</span> <span>${page.title}</span>`

      div.onclick = () => {
        loadPage(page)
      }

      menu.appendChild(div)
    })

    // 默认加载第一页
    loadPage(pages[0])


    /* 搜索功能 */
    document.getElementById("search").addEventListener("input", function () {
      const key = this.value.toLowerCase()
      document.querySelectorAll(".menu-item").forEach(item => {
        const text = item.innerText.toLowerCase()
        item.style.display = text.includes(key) ? "flex" : "none"
      })
    })
  </script>
</body>

</html>
